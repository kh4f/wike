name: Release

on: { push: { tags: 'v[0-9]+.[0-9]+.[0-9]+*' } }

jobs:
  release:
    runs-on: ubuntu-latest
    permissions: { contents: write } # for creating a GitHub release
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with: { go-version: 1.26.0 }

      - name: Install windres
        run: |
            sudo apt-get install -y binutils-mingw-w64-x86-64
            sudo ln -s /usr/bin/x86_64-w64-mingw32-windres /usr/local/bin/windres

      - name: Set env variables
        run: echo -e ZIP=${GITHUB_REPOSITORY#*/}-$TAG.zip >> $GITHUB_ENV

      - name: Build
        run: go run tasks.go -b

      - name: Create release archive
        run: zip $ZIP Wike.exe

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create $TAG $ZIP --title $TAG --draft